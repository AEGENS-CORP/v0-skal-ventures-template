name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - production
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NODE_ENV: production
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      NEXT_PUBLIC_BASE_URL: ${{ vars.NEXT_PUBLIC_BASE_URL }}
      CF_PAGES_PROJECT: ${{ vars.CF_PAGES_PROJECT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Cloudflare secrets
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing secret: CLOUDFLARE_API_TOKEN" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing secret: CLOUDFLARE_ACCOUNT_ID" && exit 1)

      - name: Build for Cloudflare Pages
        run: pnpm cf:pages:build

      - name: Deploy to Cloudflare Pages
        run: |
          PROJECT="${CF_PAGES_PROJECT:-aegens}"
          BRANCH="${GITHUB_REF_NAME}"
          pnpm dlx wrangler pages deploy .vercel/output/static --project-name="${PROJECT}" --branch="${BRANCH}"
